services:
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: home-assistant
    restart: unless-stopped
    privileged: false
    network_mode: host
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - "/volume1/docker/home-assistant:/config"
      - /etc/localtime:/etc/localtime:ro
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"